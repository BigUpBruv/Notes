<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Notatnik</title>

<style>
body {
    font-family: Arial;
    padding: 20px;
    background: #f4f4f4;
}

input, textarea, select {
    display: block;
    width: 300px;
    margin: 10px 0;
    padding: 8px;
}

button {
    margin: 5px 5px 5px 0;
    padding: 6px 10px;
    cursor: pointer;
}

#notesList {
    list-style: none;
    padding: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
}

#notesList li {
    width: 220px;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow-wrap: break-word;
    word-break: break-word;
}

.noteButtons {
    display: flex;
    gap: 8px;
}

#notesList li button {
    margin-top: 8px;
    padding: 5px 8px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    color: white;
    transition: opacity 0.2s;
}

#notesList li button:hover {
    opacity: 0.8;
}
</style>
</head>

<body>

<h1>Notatnik</h1>
<h2 id="notesCounter">Liczba notatek: 0</h2>

<input id="titleInput" placeholder="Tytuł notatki">
<textarea id="contentInput" placeholder="Treść notatki"></textarea>

<select id="colorPicker">
<option value="#ffadad">Czerwony</option>
<option value="#ffd6a5">Pomarańczowy</option>
<option value="#fdffb6">Żółty</option>
<option value="#caffbf">Zielony</option>
<option value="#9bf6ff">Niebieski</option>
<option value="#a0c4ff">Fioletowy</option>
<option value="#00008b">Ciemnoniebieski</option>
</select>

<button id="addButton">Dodaj notatkę</button>

<ul id="notesList"></ul>

<script>

const titleInput = document.getElementById('titleInput');
const contentInput = document.getElementById('contentInput');
const addButton = document.getElementById('addButton');
const notesList = document.getElementById('notesList');
const notesCounter = document.getElementById('notesCounter');
const colorPicker = document.getElementById('colorPicker');

loadNotes();
updateCounter();

addButton.addEventListener('click', () => {

    const title = titleInput.value.trim();
    const content = contentInput.value.trim();
    const color = colorPicker.value;

    if(!title || !content){
        alert("Wpisz tytuł i treść!");
        return;
    }

    createNote(title, content, color);

    titleInput.value = "";
    contentInput.value = "";

    saveNotes();
    updateCounter();
});

function createNote(title, content, color){

    const li = document.createElement('li');

    li.style.backgroundColor = color;
    li.style.color = getTextColor(color);
    li.dataset.color = color;

    const contentDiv = document.createElement('div');
    contentDiv.className = "noteContent";

    const strong = document.createElement('strong');
    strong.textContent = title;

    const text = document.createElement('p');
    text.textContent = content;

    contentDiv.appendChild(strong);
    contentDiv.appendChild(text);

    const buttonsDiv = document.createElement('div');
    buttonsDiv.className = "noteButtons";

    const editBtn = document.createElement('button');
    editBtn.textContent = "Edytuj";

    const deleteBtn = document.createElement('button');
    deleteBtn.textContent = "Usuń";

    // kolory przycisków = ciemniejszy kolor notatki
    const darker = darken(color);
    editBtn.style.backgroundColor = darker;
    deleteBtn.style.backgroundColor = darker;

    buttonsDiv.appendChild(editBtn);
    buttonsDiv.appendChild(deleteBtn);

    li.appendChild(contentDiv);
    li.appendChild(buttonsDiv);

    notesList.appendChild(li);

    deleteBtn.addEventListener('click', () => {
        li.remove();
        saveNotes();
        updateCounter();
    });

    editBtn.addEventListener('click', () => {
        titleInput.value = strong.textContent;
        contentInput.value = text.textContent;
        li.remove();
        saveNotes();
        updateCounter();
    });
}

function saveNotes(){
    const notesArray = [];

    document.querySelectorAll('#notesList li').forEach(li => {

        const title = li.querySelector('strong').textContent;
        const content = li.querySelector('p').textContent;
        const color = li.dataset.color;

        notesArray.push({ title, content, color });
    });

    localStorage.setItem('savedNotes', JSON.stringify(notesArray));
}

function loadNotes(){
    const saved = JSON.parse(localStorage.getItem('savedNotes')) || [];
    saved.forEach(note => createNote(note.title, note.content, note.color));
}

function updateCounter(){
    const count = document.querySelectorAll('#notesList li').length;
    notesCounter.textContent = "Liczba notatek: " + count;
}

// przyciemnianie koloru (prosty system)
function darken(hex){
    let r = parseInt(hex.substring(1,3),16);
    let g = parseInt(hex.substring(3,5),16);
    let b = parseInt(hex.substring(5,7),16);

    r = Math.max(0, r - 40);
    g = Math.max(0, g - 40);
    b = Math.max(0, b - 40);

    return `rgb(${r},${g},${b})`;
}

function getTextColor(hex){
    let r = parseInt(hex.substring(1,3),16);
    let g = parseInt(hex.substring(3,5),16);
    let b = parseInt(hex.substring(5,7),16);

    const brightness = (r*299 + g*587 + b*114) / 1000;

    return brightness > 140 ? "black" : "white";
}

</script>

</body>
</html>
